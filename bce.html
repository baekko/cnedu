<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Call End</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
    }

    body {
      background: url("images/bookcallend-bg.jpg") no-repeat center center / cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      padding: 20px;
    }

    .end-box {
      width: min(88vw, 760px);
      background: rgba(0,0,0,0.58);
      border-radius: 24px;
      padding: 42px 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.32);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 18px;
    }

    .desc {
      font-size: 24px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .score {
      font-size: 34px;
      font-weight: 900;
      margin-top: 8px;
    }

    .detail {
      margin-top: 24px;
      font-size: 18px;
      line-height: 1.8;
      opacity: 0.96;
      white-space: pre-line;
    }

    @media (max-width: 1024px) {
      h1 {
        font-size: 34px;
      }

      .desc {
        font-size: 20px;
      }

      .score {
        font-size: 28px;
      }

      .detail {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="end-box">
    <h1>탈출 성공</h1>
    <div class="desc">모든 북 콜 미션을 완료했습니다.</div>
    <div class="score" id="finalScore">총점 0점 / 22점</div>
    <div class="detail" id="scoreDetail"></div>
  </div>

  <script>
    const PROGRESS_KEY = "bookcall_progress_v2";

    function getProgress() {
      return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {};
    }

    const progress = getProgress();

    let total = 0;
    let detailText = "";

    for (let i = 1; i <= 11; i++) {
      const score = progress[i] && progress[i].completed ? Number(progress[i].score || 0) : 0;
      total += score;
      detailText += `${i}번 문제 : ${score}점\n`;
    }

    document.getElementById("finalScore").textContent = `총점 ${total}점 / 22점`;
    document.getElementById("scoreDetail").textContent = detailText;
  </script>
</body>
</html>
